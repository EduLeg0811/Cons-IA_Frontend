<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Embed ConsBOT</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <link rel="stylesheet" href="/styles/style.css">
  <link rel="icon" type="image/png" href="/icon.png">
  <style>
    html,
    body {
      margin: 0;
      overflow: hidden;
    }

    body.theme-bots {
      min-height: auto;
      background: transparent;
    }

    .embed-shell {
      max-width: 920px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      column-gap: 12px;
      row-gap: 4px;
      align-items: start;
      padding: 10px 12px 6px;
      box-sizing: border-box;
    }

    .embed-main {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .embed-header-icon {
      width: 50px;
      height: 50px;
      border-radius: var(--radius-xl);
      background: transparent;
      color: var(--bots-primary);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
      text-decoration: none;
      transition: transform 160ms ease, opacity 160ms ease, filter 160ms ease;
      align-self: center;
    }

    .embed-header-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .embed-header-icon:hover {
      transform: translateY(-1px) scale(1.04);
      opacity: 0.94;
      filter: saturate(1.05);
    }

    .embed-brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0px;
      flex-shrink: 0;
      justify-content: flex-start;
      grid-column: 1;
      grid-row: 1;
    }

    .embed-title {
      margin: 0;
      color: var(--gray-900);
      font-size: 0.95rem;
      font-weight: 700;
      line-height: 1.1;
      text-align: center;
    }

    .search-container {
      margin-bottom: 0;
      display: flex;
      align-items: center;
      grid-column: 2;
      grid-row: 1;
    }

    .search-row {
      width: 100%;
    }

    .search-input-wrapper {
      display: flex;
      align-items: center;
      width: 100%;
      min-height: 58px;
      padding: 8px 10px;
      gap: 10px;
      border-radius: 18px;
      box-sizing: border-box;
    }

    .search-input {
      display: block;
      flex: 1;
      min-height: 26px;
      max-height: 110px;
      padding: 6px 0;
      margin: 0;
      font-size: 0.95rem;
      line-height: 1.4;
    }

    .search-button {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 42px;
      height: 42px;
      padding: 0;
      border: none;
      font-size: 0.95rem;
      border-radius: 14px;
      flex-shrink: 0;
    }

    .search-button i {
      display: block;
      line-height: 1;
    }

    .search-button.ragbot-loading i {
      opacity: 0;
    }

    .search-button.ragbot-loading::after {
      content: '';
      position: absolute;
      inset: 0;
      width: 18px;
      height: 18px;
      margin: auto;
      border-radius: 999px;
      border: 2px solid rgba(255, 255, 255, 0.88);
      border-top-color: transparent;
      animation: embedSpin 0.7s linear infinite;
      pointer-events: none;
    }

    .response-container {
      width: 100%;
      margin-top: 0;
      display: none;
      box-sizing: border-box;
      grid-column: 2;
      grid-row: 2;
    }

    .response-frame {
      width: 100%;
      min-height: 60px;
      padding: 6px 10px;
      gap: 10px;
      border-radius: 18px;
      display: flex;
      align-items: stretch;
      box-sizing: border-box;
    }

    .response-body {
      flex: 1;
      min-width: 0;
      min-height: 44px;
      padding: 6px 0;
      font-size: 0.95rem;
      line-height: 1.4;
      color: var(--gray-800);
    }

    .response-body p:first-child {
      margin-top: 0;
    }

    .response-body p:last-child {
      margin-bottom: 0;
    }

    .response-frame.is-empty .response-body {
      color: var(--gray-500);
    }

    .response-loading {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 44px;
      color: var(--gray-500);
    }

    .response-loading-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--bots-primary);
      opacity: 0.28;
      animation: embedPulse 1.2s ease-in-out infinite;
    }

    .response-loading-dot:nth-child(2) {
      animation-delay: 0.18s;
    }

    .response-loading-dot:nth-child(3) {
      animation-delay: 0.36s;
    }

    .response-loading-text {
      font-size: 0.9rem;
      letter-spacing: 0.01em;
    }

    @keyframes embedPulse {
      0%, 100% {
        transform: translateY(0);
        opacity: 0.25;
      }
      50% {
        transform: translateY(-2px);
        opacity: 0.72;
      }
    }

    @keyframes embedSpin {
      from {
        transform: rotate(0deg);
      }
      to {
        transform: rotate(360deg);
      }
    }

    .embed-footnote {
      margin-top: 8px;
      color: var(--gray-500);
      font-size: 0.76rem;
      line-height: 1.35;
    }

    @media (max-width: 720px) {
      .embed-shell {
        padding: 8px;
        gap: 8px;
      }

      .search-input-wrapper {
        min-height: 54px;
      }
    }
  </style>
</head>
<body class="theme-bots">
  <div class="embed-shell">
    <div class="embed-brand">
      <h1 class="embed-title" id="title">ConsBOT</h1>
      <a class="embed-header-icon" id="brandLink" href="https://cons-ia.org" target="_blank" rel="noopener noreferrer" aria-label="Abrir cons-ia.org">
        <img src="/icon.png" alt="Cons-IA">
      </a>
    </div>

    <div class="search-container">
      <div class="search-row">
        <div class="search-input-wrapper">
          <textarea id="queryInput" placeholder="Olá Conscienciólogo!" class="search-input" rows="1"></textarea>
          <button id="askButton" class="search-button" type="button" aria-label="Consultar">
            <i class="fas fa-paper-plane"></i>
          </button>
        </div>
      </div>
    </div>

    <div class="response-container">
      <div class="search-input-wrapper response-frame is-empty" id="responseFrame">
        <div class="response-body markdown-content" id="answerBox">A resposta aparecerá aqui.</div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script>
    const DEFAULT_INSTRUCTIONS = [
      `System:
        Você é um assistente de IA **direto**, **claro** e **produtivo**, especializado em **Conscienciologia (Waldo Vieira)**, voltado à conversa, educação e apoio a **estudantes** e **acadêmicos**.

        Princípios gerais
        - Seja **aberto a hipóteses**, mas **não concorde** com afirmações que entrem em conflito com as evidências disponíveis.
        - Ao dar feedback, seja **claro**, **corretivo** e **sem rodeios**, porém com **gentileza** e **apoio**.
        - Adapte o encorajamento ao contexto do usuário.
        - Baseie todas as afirmações nas **informações fornecidas**.
        - **Não fabrique** fatos, números, fontes ou citações.
        - Se houver incerteza, diga isso explicitamente e informe qual informação adicional seria necessária.
        - **Não diga** que a Conscienciologia “não é baseada na ciência convencional”, pois a Conscienciologia é tratada aqui como uma **ciência nova**.
        - **Não imponha automaticamente** essa personalidade a artefatos escritos; deixe o contexto e a intenção do usuário guiarem o estilo.
        - Use sempre **Markdown limpo** (headers, negrito, itálico ou negrito-itálico) para enfatizar palavras, termos e títulos.
        - Responda sempre no **idioma da consulta do usuário** (preferencialmente **português brasileiro**), usando, quando adequado, a **terminologia da Conscienciologia**.

        Formato obrigatório de saída
        Toda resposta final deve seguir o formato padrão:

        **[Título da Resposta]**
        **Definição.** [1 frase breve, direta e objetiva, definindo o tema segundo a ótica da Conscienciologia. Nessa frase, coloque em itálico o termo principal, e não use marcação em nenhuma outra parte da frase.]

        **Argumentação**
        [Resposta direta à pergunta do usuário e desenvolvimento do ponto principal, em parágrafos curtos.]

        **Exemplo**
        [Exemplo prático, ponto complementar ou distinção.]

        **Conclusão**
        [Síntese conclusiva em 1 frase.]

        **Sugestões de Aprofundamento:**
        - [Tema sugerido 1]
        - [Tema sugerido 2]

        **Link para o Cons-IA completo:**
        - https://cons-ia.org

        Regras obrigatórias do formato
        - O **Título da Resposta** deve ser curto, específico e derivado diretamente do tema central da pergunta do usuário, com normalização simples:
        - use entre **2 e 5 palavras**;
        - prefira **substantivos e termos centrais** da pergunta;
        - evite pontuação desnecessária, aspas e títulos genéricos como **“Resposta”** ou **“Explicação”**.
        - Use bullets apenas quando houver uma lista real de itens distintos.
        - Não inclua referências no corpo principal.
        - A seção **Referências** só deve aparecer se houver de fontes explícitas na resposta (nomes de livros, tratados ou verbetes).

        Casos especiais
        - Se a pergunta for muito básica sobre Conscienciologia, a sugestão ao livro **"Nossa Evolução"** e ao site **www.icge.org.br** deve aparecer em **Sugestões de Aprofundamento**.
        - Se a pergunta estiver ambígua ou não houver base suficiente para resposta substantiva, ainda assim produza o formato completo obrigatório, sinalizando claramente as limitações nas seções correspondentes.
        `
    ].join(' ');

    const SOURCE_LABELS = {
      ALLWV: 'Bibliografia Waldo Vieira',
      AUTORES: 'Autores Diversos',
      ENGLISH: 'Bibliography in English',
      MINI: 'Registros Minitertúlia'
    };

    const params = new URLSearchParams(window.location.search);
    const apiBase = (params.get('api') || 'https://cons-ai-server.onrender.com').replace(/\/+$/, '');
    const source = (params.get('source') || 'ALLWV').toUpperCase();
    const title = params.get('title') || 'ConsBOT';
    const subtitle = params.get('subtitle') || 'Assistente de IA da Conscienciologia.';
    const placeholder = params.get('placeholder') || 'Olá Conscienciólogo!';
    const initialQuestion = params.get('question') || '';
    const popupPath = params.get('popup') || '/index_ragbot.html';

    const queryInputEl = document.getElementById('queryInput');
    const askButtonEl = document.getElementById('askButton');
    const answerBoxEl = document.getElementById('answerBox');
    const responseFrameEl = document.getElementById('responseFrame');

    const titleEl = document.getElementById('title');
    const brandLinkEl = document.getElementById('brandLink');

    document.title = title;
    titleEl.textContent = title;
    queryInputEl.placeholder = placeholder;
    queryInputEl.value = initialQuestion;

    brandLinkEl.addEventListener('click', (event) => {
      event.preventDefault();
      window.open(brandLinkEl.href, '_blank', 'noopener,noreferrer');
    });

    function setStatus() {}

    function openInNewTabSilently(url) {
      const tempLink = document.createElement('a');
      tempLink.href = url;
      tempLink.target = '_blank';
      tempLink.rel = 'noopener noreferrer';
      tempLink.style.display = 'none';
      document.body.appendChild(tempLink);
      tempLink.click();
      tempLink.remove();
      return true;
    }

    function openConsbotPopup(query) {
      const popupUrl = new URL(popupPath, window.location.href);
      popupUrl.searchParams.set('question', query);
      popupUrl.searchParams.set('source', source);
      popupUrl.searchParams.set('api', apiBase);

      const popupWidth = Math.min(Math.max(window.screen?.availWidth ? Math.round(window.screen.availWidth * 0.78) : 1100, 960), 1440);
      const popupHeight = Math.min(Math.max(window.screen?.availHeight ? Math.round(window.screen.availHeight * 0.84) : 820, 720), 1200);
      const popupLeft = Math.max(0, Math.round(((window.screen?.availWidth || popupWidth) - popupWidth) / 2));
      const popupTop = Math.max(0, Math.round(((window.screen?.availHeight || popupHeight) - popupHeight) / 2));
      const popupFeatures = [
        'popup=yes',
        'noopener=yes',
        'noreferrer=yes',
        `width=${popupWidth}`,
        `height=${popupHeight}`,
        `left=${popupLeft}`,
        `top=${popupTop}`,
        'resizable=yes',
        'scrollbars=yes'
      ].join(',');

      const popupWindow = window.open(popupUrl.toString(), 'consbotPopup', popupFeatures);
      if (!popupWindow) {
        return openInNewTabSilently(popupUrl.toString());
      }

      try {
        popupWindow.focus();
      } catch {}
      return true;
    }

    function renderMarkdown(text) {
      const rawHtml = marked.parse(text || '', { breaks: true });
      return DOMPurify.sanitize(rawHtml);
    }

    function setAnswer(text, isError) {
      responseFrameEl.parentElement.style.display = 'block';
      responseFrameEl.classList.remove('is-empty');
      answerBoxEl.innerHTML = renderMarkdown(text);
      answerBoxEl.style.color = isError ? '#b42318' : '';
    }

    function resetAnswerStyle() {
      answerBoxEl.style.color = '';
    }

    async function askConsbot() {
      const query = queryInputEl.value.trim();
      if (!query) {
        setStatus('Digite uma pergunta antes de consultar.');
        queryInputEl.focus();
        return;
      }

      askButtonEl.disabled = true;
      askButtonEl.classList.add('ragbot-loading');
      setStatus('Abrindo o ConsBOT...');

      try {
        openConsbotPopup(query);
        setStatus('ConsBOT aberto.');
      } catch (error) {
        setStatus('');
      } finally {
        askButtonEl.disabled = false;
        askButtonEl.classList.remove('ragbot-loading');
      }
    }

    askButtonEl.addEventListener('click', askConsbot);
    queryInputEl.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        askConsbot();
      }
    });

    setStatus('Pronto para consulta.');
  </script>
</body>
</html>
