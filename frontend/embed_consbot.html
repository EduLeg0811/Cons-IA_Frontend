<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Embed ConsBOT</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <link rel="stylesheet" href="/styles/style.css">
  <link rel="icon" type="image/png" href="/icon.png">
  <style>
    body.theme-bots {
      min-height: auto;
      background: transparent;
    }

    .embed-shell {
      max-width: 920px;
      margin: 0 auto;
      padding: 10px 12px;
    }

    .embed-card {
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-2xl);
      box-shadow: var(--shadow-sm);
      padding: 12px;
    }

    .embed-header {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 10px;
    }

    .embed-header-icon {
      width: 38px;
      height: 38px;
      border-radius: var(--radius-xl);
      background: color-mix(in srgb, var(--bots-primary) 14%, white);
      color: var(--bots-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .embed-header-copy {
      min-width: 0;
    }

    .embed-title {
      margin: 0;
      color: var(--gray-900);
      font-size: 1.05rem;
      font-weight: 700;
      line-height: 1.2;
    }

    .embed-subtitle {
      margin: 2px 0 0;
      color: var(--gray-600);
      font-size: 0.88rem;
      line-height: 1.35;
    }

    .search-container {
      margin-bottom: 6px;
    }

    .search-input-wrapper {
      padding: 8px 10px;
      gap: 10px;
      border-radius: 18px;
    }

    .search-input {
      min-height: 26px;
      max-height: 110px;
      padding: 6px 0;
      font-size: 0.95rem;
      line-height: 1.4;
    }

    .search-button {
      width: 42px;
      height: 42px;
      font-size: 0.95rem;
      border-radius: 14px;
      flex-shrink: 0;
    }

    .chat-messages {
      padding: 4px 0 0;
      gap: 10px;
      max-height: none;
      min-height: 110px;
    }

    .chat-message {
      max-width: 100%;
    }

    .message-avatar {
      width: 36px;
      height: 36px;
      font-size: 0.95rem;
    }

    .message-content {
      border-radius: 18px;
    }

    .theme-bots .chat-message.bot .message-content {
      padding: 12px 14px;
    }

    .theme-bots .chat-message.bot .message-content .markdown-content {
      font-size: 0.94rem;
      line-height: 1.5;
    }

    .theme-bots .chat-message.bot .message-content .markdown-content p:first-child {
      margin-top: 0;
    }

    .theme-bots .chat-message.bot .message-content .markdown-content p:last-child {
      margin-bottom: 0;
    }

    .chat-message.bot.is-empty .message-content {
      color: var(--gray-500);
    }

    .embed-footnote {
      margin-top: 8px;
      color: var(--gray-500);
      font-size: 0.76rem;
      line-height: 1.35;
    }

    @media (max-width: 720px) {
      .embed-shell {
        padding: 8px;
      }

      .embed-card {
        padding: 10px;
      }

      .embed-title {
        font-size: 1rem;
      }

      .embed-subtitle {
        font-size: 0.84rem;
      }
    }
  </style>
</head>
<body class="theme-bots">
  <div class="embed-shell">
    <div class="embed-card">
      <div class="embed-header">
        <div class="embed-header-icon" aria-hidden="true">
          <i class="fas fa-comments"></i>
        </div>
        <div class="embed-header-copy">
          <h1 class="embed-title" id="title">ConsBOT</h1>
          <p class="embed-subtitle" id="subtitle">IA da Conscienciologia com consulta direta e compacta para uso em iframe.</p>
        </div>
      </div>

      <div class="search-container">
        <div class="search-row">
          <div class="search-input-wrapper">
            <textarea id="queryInput" placeholder="Sobre o que você gostaria de conversar?" class="search-input" rows="1"></textarea>
            <button id="askButton" class="search-button" type="button" aria-label="Consultar">
              <i class="fas fa-paper-plane"></i>
            </button>
          </div>
        </div>
      </div>

      <div class="chat-messages" id="chatMessages">
        <div class="chat-message bot is-empty" id="botMessage">
          <div class="message-content">
            <div class="markdown-content" id="answerBox">A resposta aparecerá aqui.</div>
          </div>
        </div>
      </div>

      <div class="embed-footnote">Parâmetros opcionais: <code>?api=https://seu-backend</code>, <code>&source=ALLWV</code>, <code>&title=Seu%20Título</code>.</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script>
    const DEFAULT_INSTRUCTIONS = [
      'Você é um assistente direto, claro e produtivo, especializado em Conscienciologia.',
      'Baseie as afirmações apenas nas informações fornecidas pelos documentos consultados.',
      'Responda no idioma da consulta do usuário, preferencialmente em português brasileiro.',
      'Use Markdown simples somente quando ajudar a legibilidade.',
      'Se houver incerteza, diga isso explicitamente.'
    ].join(' ');

    const SOURCE_LABELS = {
      ALLWV: 'Bibliografia Waldo Vieira',
      AUTORES: 'Autores Diversos',
      ENGLISH: 'Bibliography in English',
      MINI: 'Registros Minitertúlia'
    };

    const params = new URLSearchParams(window.location.search);
    const apiBase = (params.get('api') || 'https://cons-ai-server.onrender.com').replace(/\/+$/, '');
    const source = (params.get('source') || 'ALLWV').toUpperCase();
    const title = params.get('title') || 'ConsBOT';
    const subtitle = params.get('subtitle') || 'IA da Conscienciologia com consulta direta e compacta para uso em iframe.';
    const placeholder = params.get('placeholder') || 'Sobre o que você gostaria de conversar?';

    const titleEl = document.getElementById('title');
    const subtitleEl = document.getElementById('subtitle');
    const queryInputEl = document.getElementById('queryInput');
    const askButtonEl = document.getElementById('askButton');
    const answerBoxEl = document.getElementById('answerBox');
    const botMessageEl = document.getElementById('botMessage');

    titleEl.textContent = title;
    subtitleEl.textContent = subtitle;
    queryInputEl.placeholder = placeholder;

    function setStatus() {}

    function renderMarkdown(text) {
      const rawHtml = marked.parse(text || '', { breaks: true });
      return DOMPurify.sanitize(rawHtml);
    }

    function setAnswer(text, isError) {
      botMessageEl.classList.remove('is-empty');
      answerBoxEl.innerHTML = renderMarkdown(text);
      answerBoxEl.style.color = isError ? '#b42318' : '';
    }

    function resetAnswerStyle() {
      answerBoxEl.style.color = '';
    }

    async function askConsbot() {
      const query = queryInputEl.value.trim();
      if (!query) {
        setStatus('Digite uma pergunta antes de consultar.');
        queryInputEl.focus();
        return;
      }

      askButtonEl.disabled = true;
      askButtonEl.classList.add('ragbot-loading');
      resetAnswerStyle();
      setStatus('Consultando o ConsBOT...');
      setAnswer('Aguarde enquanto a consulta é processada.', false);

      try {
        const response = await fetch(`${apiBase}/llm_query`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            query,
            model: 'gpt-5.4-mini',
            temperature: 0.3,
            llm_max_results: 3,
            max_output_tokens: 1000,
            vector_store_names: [source],
            instructions: DEFAULT_INSTRUCTIONS,
            reasoning_effort: 'none',
            verbosity: 'low',
            use_session: true
          })
        });

        const data = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(data.error || `HTTP ${response.status}`);
        }

        setAnswer(data.text || 'Sem resposta retornada.', false);
        setStatus('Consulta concluída.');
      } catch (error) {
        setAnswer(`Erro na consulta: ${error.message || 'falha inesperada.'}`, true);
        setStatus('Falha ao consultar o ConsBOT.');
      } finally {
        askButtonEl.disabled = false;
        askButtonEl.classList.remove('ragbot-loading');
      }
    }

    askButtonEl.addEventListener('click', askConsbot);
    queryInputEl.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        askConsbot();
      }
    });

    setStatus('Pronto para consulta.');
  </script>
</body>
</html>
