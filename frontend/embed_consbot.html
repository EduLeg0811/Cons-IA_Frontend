<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Embed ConsBOT</title>
  <style>
    :root {
      --bg: linear-gradient(180deg, #f3fbf8 0%, #eef6ff 100%);
      --surface: rgba(255, 255, 255, 0.92);
      --surface-strong: #ffffff;
      --border: rgba(15, 23, 42, 0.10);
      --text: #17324a;
      --muted: #5e7488;
      --accent: #0f9f78;
      --accent-strong: #0b7a5d;
      --accent-soft: #ddf7ee;
      --shadow: 0 20px 50px rgba(15, 23, 42, 0.10);
      --radius: 20px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      width: min(100%, 920px);
      margin: 0 auto;
      padding: 24px;
    }

    .widget {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(10px);
    }

    .hero {
      padding: 24px 24px 16px;
      background:
        radial-gradient(circle at top right, rgba(16, 185, 129, 0.18), transparent 34%),
        linear-gradient(135deg, rgba(226, 248, 240, 0.95), rgba(240, 247, 255, 0.9));
      border-bottom: 1px solid var(--border);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 999px;
      background: var(--surface-strong);
      border: 1px solid var(--border);
      color: var(--accent-strong);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 14px 0 8px;
      font-size: clamp(28px, 4vw, 40px);
      line-height: 1.05;
      font-weight: 700;
    }

    .subtitle {
      margin: 0;
      max-width: 58ch;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.55;
    }

    .panel {
      padding: 16px 20px 18px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 8px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent-strong);
      font-size: 13px;
      border: 1px solid rgba(15, 159, 120, 0.18);
    }

    .status {
      color: var(--muted);
      font-size: 13px;
    }

    .composer {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: end;
      margin-bottom: 10px;
    }

    #sourceBadge {
      display: none;
    }

    textarea {
      width: 100%;
      min-height: 88px;
      resize: vertical;
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px 18px;
      font: inherit;
      font-size: 16px;
      line-height: 1.5;
      color: var(--text);
      background: var(--surface-strong);
      outline: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
    }

    textarea:focus {
      border-color: rgba(15, 159, 120, 0.55);
      box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.12);
    }

    button {
      border: 0;
      border-radius: 16px;
      padding: 14px 18px;
      min-width: 136px;
      font: inherit;
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      cursor: pointer;
      transition: transform 0.18s ease, opacity 0.18s ease, box-shadow 0.18s ease;
      box-shadow: 0 14px 30px rgba(11, 122, 93, 0.22);
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.72;
      cursor: wait;
      transform: none;
    }

    .answer {
      background: var(--surface-strong);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 14px 16px;
      min-height: 132px;
      white-space: pre-wrap;
      line-height: 1.6;
    }

    .answer.is-empty {
      color: var(--muted);
    }

    .footnote {
      margin-top: 14px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    @media (max-width: 720px) {
      .wrap {
        padding: 14px;
      }

      .hero,
      .panel {
        padding-left: 14px;
        padding-right: 14px;
      }

      .composer {
        grid-template-columns: 1fr;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="widget" aria-label="Consulta ConsBOT">
      <header class="hero">
        <div class="eyebrow">ConsBOT Embed</div>
        <h1 id="title">ConsBOT</h1>
        <p class="subtitle" id="subtitle">Caixa compacta para consulta de conteúdos da Conscienciologia em outros sites.</p>
      </header>

      <div class="panel">
        <div class="toolbar">
          <div class="badge" id="sourceBadge">Fonte: Bibliografia Waldo Vieira</div>
          <div class="status" id="status">Pronto para consulta.</div>
        </div>

        <div class="composer">
          <textarea id="queryInput" placeholder="Digite aqui a sua pergunta para o ConsBOT"></textarea>
          <button id="askButton" type="button">Consultar</button>
        </div>

        <div class="answer is-empty" id="answerBox">A resposta aparecerá aqui.</div>
        <div class="footnote" id="footnote">Parâmetros opcionais na URL: <code>?api=https://seu-backend</code>, <code>&source=ALLWV</code>, <code>&title=Seu%20Título</code>.</div>
      </div>
    </section>
  </div>

  <script>
    const DEFAULT_INSTRUCTIONS = [
      'Você é um assistente direto, claro e produtivo, especializado em Conscienciologia.',
      'Baseie as afirmações apenas nas informações fornecidas pelos documentos consultados.',
      'Responda no idioma da consulta do usuário, preferencialmente em português brasileiro.',
      'Use Markdown simples somente quando ajudar a legibilidade.',
      'Se houver incerteza, diga isso explicitamente.'
    ].join(' ');

    const SOURCE_LABELS = {
      ALLWV: 'Bibliografia Waldo Vieira',
      AUTORES: 'Autores Diversos',
      ENGLISH: 'Bibliography in English',
      MINI: 'Registros Minitertúlia'
    };

    const params = new URLSearchParams(window.location.search);
    const apiBase = (params.get('api') || 'https://cons-ai-server.onrender.com').replace(/\/+$/, '');
    const source = (params.get('source') || 'ALLWV').toUpperCase();
    const title = params.get('title') || 'ConsBOT';
    const subtitle = params.get('subtitle') || 'Caixa compacta para consulta de conteúdos da Conscienciologia em outros sites.';
    const placeholder = params.get('placeholder') || 'Digite aqui a sua pergunta para o ConsBOT';

    const titleEl = document.getElementById('title');
    const subtitleEl = document.getElementById('subtitle');
    const sourceBadgeEl = document.getElementById('sourceBadge');
    const statusEl = document.getElementById('status');
    const queryInputEl = document.getElementById('queryInput');
    const askButtonEl = document.getElementById('askButton');
    const answerBoxEl = document.getElementById('answerBox');

    function hideSearchOptionsButton(root = document) {
      const candidates = root.querySelectorAll('button, [role="button"], summary, a');
      candidates.forEach((element) => {
        const label = (element.textContent || element.getAttribute('aria-label') || '').trim().toLowerCase();
        if (label === 'search options') {
          element.style.display = 'none';
        }
      });
    }

    titleEl.textContent = title;
    subtitleEl.textContent = subtitle;
    sourceBadgeEl.textContent = `Fonte: ${SOURCE_LABELS[source] || source}`;
    queryInputEl.placeholder = placeholder;

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function setAnswer(text, isError) {
      answerBoxEl.classList.remove('is-empty');
      answerBoxEl.textContent = text;
      answerBoxEl.style.color = isError ? '#a11d33' : '';
    }

    function resetAnswerStyle() {
      answerBoxEl.style.color = '';
    }

    async function askConsbot() {
      const query = queryInputEl.value.trim();
      if (!query) {
        setStatus('Digite uma pergunta antes de consultar.');
        queryInputEl.focus();
        return;
      }

      askButtonEl.disabled = true;
      resetAnswerStyle();
      setStatus('Consultando o ConsBOT...');
      setAnswer('Aguarde enquanto a consulta é processada.', false);

      try {
        const response = await fetch(`${apiBase}/llm_query`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            query,
            model: 'gpt-5.4-mini',
            temperature: 0.3,
            llm_max_results: 3,
            max_output_tokens: 1000,
            vector_store_names: [source],
            instructions: DEFAULT_INSTRUCTIONS,
            reasoning_effort: 'none',
            verbosity: 'low',
            use_session: true
          })
        });

        const data = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(data.error || `HTTP ${response.status}`);
        }

        setAnswer(data.text || 'Sem resposta retornada.', false);
        setStatus('Consulta concluída.');
      } catch (error) {
        setAnswer(`Erro na consulta: ${error.message || 'falha inesperada.'}`, true);
        setStatus('Falha ao consultar o ConsBOT.');
      } finally {
        askButtonEl.disabled = false;
      }
    }

    askButtonEl.addEventListener('click', askConsbot);
    queryInputEl.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        askConsbot();
      }
    });

    hideSearchOptionsButton();
    new MutationObserver((mutations) => {
      mutations.forEach((mutation) => {
        mutation.addedNodes.forEach((node) => {
          if (node.nodeType === Node.ELEMENT_NODE) {
            hideSearchOptionsButton(node);
          }
        });
      });
    }).observe(document.body, { childList: true, subtree: true });
  </script>
</body>
</html>
