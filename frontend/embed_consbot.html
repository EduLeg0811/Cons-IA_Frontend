<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Embed ConsBOT</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <link rel="stylesheet" href="/styles/style.css">
  <link rel="icon" type="image/png" href="/icon.png">
  <style>
    body.theme-bots {
      min-height: auto;
      background: transparent;
    }

    .embed-shell {
      max-width: 920px;
      margin: 0 auto;
      padding: 10px 12px;
    }

    .embed-card {
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-2xl);
      box-shadow: var(--shadow-sm);
      padding: 12px 14px;
    }

    .embed-header {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 10px;
    }

    .embed-header-icon {
      width: 38px;
      height: 38px;
      border-radius: var(--radius-xl);
      background: color-mix(in srgb, var(--bots-primary) 14%, white);
      color: var(--bots-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .embed-header-copy {
      min-width: 0;
    }

    .embed-title {
      margin: 0;
      color: var(--gray-900);
      font-size: 1.05rem;
      font-weight: 700;
      line-height: 1.2;
    }

    .embed-subtitle {
      margin: 2px 0 0;
      color: var(--gray-600);
      font-size: 0.88rem;
      line-height: 1.35;
    }

    .search-container {
      margin-bottom: 6px;
    }

    .search-input-wrapper {
      padding: 8px 10px;
      gap: 10px;
      border-radius: 18px;
    }

    .search-input {
      min-height: 26px;
      max-height: 110px;
      padding: 6px 0;
      font-size: 0.95rem;
      line-height: 1.4;
    }

    .search-button {
      width: 42px;
      height: 42px;
      font-size: 0.95rem;
      border-radius: 14px;
      flex-shrink: 0;
    }

    .chat-messages {
      padding: 0;
      max-height: none;
      min-height: 0;
    }

    .chat-message {
      max-width: 100%;
    }

    .message-content {
      width: 100%;
      background: var(--white);
      border: 2px solid var(--gray-200);
      border-radius: 18px;
      padding: 8px 10px;
      box-shadow: none;
    }

    .theme-bots .chat-message.bot .message-content {
      padding: 8px 10px;
    }

    .theme-bots .chat-message.bot .message-content .markdown-content {
      min-height: 44px;
      font-size: 0.95rem;
      line-height: 1.4;
      color: var(--gray-800);
      padding: 6px 0;
    }

    .theme-bots .chat-message.bot .message-content .markdown-content p:first-child {
      margin-top: 0;
    }

    .theme-bots .chat-message.bot .message-content .markdown-content p:last-child {
      margin-bottom: 0;
    }

    .chat-message.bot.is-empty .message-content,
    .chat-message.bot.is-empty .markdown-content {
      color: var(--gray-500);
    }

    .embed-footnote {
      margin-top: 8px;
      color: var(--gray-500);
      font-size: 0.76rem;
      line-height: 1.35;
    }

    @media (max-width: 720px) {
      .embed-shell {
        padding: 8px;
      }

      .embed-card {
        padding: 10px 12px;
      }

      .embed-title {
        font-size: 1rem;
      }

      .embed-subtitle {
        font-size: 0.84rem;
      }
    }
  </style>
</head>
<body class="theme-bots">
  <div class="embed-shell">
    <div class="embed-card">
      <div class="embed-header">
        <div class="embed-header-icon" aria-hidden="true">
          <i class="fas fa-comments"></i>
        </div>
        <div class="embed-header-copy">
          <h1 class="embed-title" id="title">ConsBOT</h1>
          <p class="embed-subtitle" id="subtitle"></p>
        </div>
      </div>

      <div class="search-container">
        <div class="search-row">
          <div class="search-input-wrapper">
            <textarea id="queryInput" placeholder="Olá Conscienciólogo! Sobre o que você gostaria de conversar?" class="search-input" rows="1"></textarea>
            <button id="askButton" class="search-button" type="button" aria-label="Consultar">
              <i class="fas fa-paper-plane"></i>
            </button>
          </div>
        </div>
      </div>

      <div class="chat-messages" id="chatMessages">
        <div class="chat-message bot is-empty" id="botMessage">
          <div class="message-content">
            <div class="markdown-content" id="answerBox">A resposta aparecerá aqui.</div>
          </div>
        </div>
      </div>

      <!--<div class="embed-footnote">Parâmetros opcionais: <code>?api=https://seu-backend</code>, <code>&source=ALLWV</code>, <code>&title=Seu%20Título</code>.</div>-->
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script>
    const DEFAULT_INSTRUCTIONS = [
      `System:
        Você é um assistente de IA **direto**, **claro** e **produtivo**, especializado em **Conscienciologia (Waldo Vieira)**, voltado à conversa, educação e apoio a **estudantes** e **acadêmicos**.

        ## Princípios gerais
        - Seja **aberto a hipóteses**, mas **não concorde** com afirmações que entrem em conflito com as evidências disponíveis.
        - Ao dar feedback, seja **claro**, **corretivo** e **sem rodeios**, porém com **gentileza** e **apoio**.
        - Adapte o encorajamento ao contexto do usuário.
        - Baseie todas as afirmações nas **informações fornecidas**.
        - **Não fabrique** fatos, números, fontes ou citações.
        - Se houver incerteza, diga isso explicitamente e informe qual informação adicional seria necessária.
        - **Não diga** que a Conscienciologia “não é baseada na ciência convencional”, pois a Conscienciologia é tratada aqui como uma **ciência nova**.
        - **Não imponha automaticamente** essa personalidade a artefatos escritos; deixe o contexto e a intenção do usuário guiarem o estilo.
        - Use sempre **Markdown limpo** (headers, negrito, itálico ou negrito-itálico) para enfatizar palavras, termos e títulos.
        - Responda sempre no **idioma da consulta do usuário** (preferencialmente **português brasileiro**), usando, quando adequado, a **terminologia da Conscienciologia**.

        ## Formato obrigatório de saída
        Toda resposta final deve seguir o formato padrão:
        # [Título da Resposta]
        **Definição.** [1 frase breve, direta e objetiva, definindo o tema segundo a ótica da Conscienciologia. Nessa frase, coloque em itálico o termo principal, e não use marcação em nenhuma outra parte da frase.]

        # Argumentação
        [Resposta direta à pergunta do usuário e desenvolvimento do ponto principal, em parágrafos curtos.]

        # Exemplo
        [Exemplo prático, ponto complementar ou distinção.]

        # Conclusão
        [Síntese conclusiva em 1 frase.]

        # Sugestões de Aprofundamento:
        - [Tema sugerido 1]
        - [Tema sugerido 2]

        ## Regras obrigatórias do formato
        - O **Título da Resposta** deve ser curto, específico e derivado diretamente do tema central da pergunta do usuário, com normalização simples:
        - use entre **2 e 5 palavras**;
        - prefira **substantivos e termos centrais** da pergunta;
        - evite pontuação desnecessária, aspas e títulos genéricos como **“Resposta”** ou **“Explicação”**.
        - Use bullets apenas quando houver uma lista real de itens distintos.
        - Não inclua referências no corpo principal.
        - A seção **Referências** só deve aparecer se houver de fontes explícitas na resposta (nomes de livros, tratados ou verbetes).

        ## Casos especiais
        - Se a pergunta for muito básica sobre Conscienciologia, a sugestão ao livro **"Nossa Evolução"** e ao site **www.icge.org.br** deve aparecer em **Sugestões de Aprofundamento**.
        - Se a pergunta estiver ambígua ou não houver base suficiente para resposta substantiva, ainda assim produza o formato completo obrigatório, sinalizando claramente as limitações nas seções correspondentes.
        `
    ].join(' ');

    const SOURCE_LABELS = {
      ALLWV: 'Bibliografia Waldo Vieira',
      AUTORES: 'Autores Diversos',
      ENGLISH: 'Bibliography in English',
      MINI: 'Registros Minitertúlia'
    };

    const params = new URLSearchParams(window.location.search);
    const apiBase = (params.get('api') || 'https://cons-ai-server.onrender.com').replace(/\/+$/, '');
    const source = (params.get('source') || 'ALLWV').toUpperCase();
    const title = params.get('title') || 'ConsBOT';
    const subtitle = params.get('subtitle') || 'Bot de IA da Conscienciologia.';
    const placeholder = params.get('placeholder') || 'Olá Conscienciólogo! Sobre o que você gostaria de conversar?';

    const titleEl = document.getElementById('title');
    const subtitleEl = document.getElementById('subtitle');
    const queryInputEl = document.getElementById('queryInput');
    const askButtonEl = document.getElementById('askButton');
    const answerBoxEl = document.getElementById('answerBox');
    const botMessageEl = document.getElementById('botMessage');

    titleEl.textContent = title;
    subtitleEl.textContent = subtitle;
    queryInputEl.placeholder = placeholder;

    function setStatus() {}

    function renderMarkdown(text) {
      const rawHtml = marked.parse(text || '', { breaks: true });
      return DOMPurify.sanitize(rawHtml);
    }

    function setAnswer(text, isError) {
      botMessageEl.classList.remove('is-empty');
      answerBoxEl.innerHTML = renderMarkdown(text);
      answerBoxEl.style.color = isError ? '#b42318' : '';
    }

    function resetAnswerStyle() {
      answerBoxEl.style.color = '';
    }

    async function askConsbot() {
      const query = queryInputEl.value.trim();
      if (!query) {
        setStatus('Digite uma pergunta antes de consultar.');
        queryInputEl.focus();
        return;
      }

      askButtonEl.disabled = true;
      askButtonEl.classList.add('ragbot-loading');
      resetAnswerStyle();
      setStatus('Consultando o ConsBOT...');
      setAnswer('Aguarde enquanto a consulta é processada.', false);

      try {
        const response = await fetch(`${apiBase}/llm_query`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            query,
            model: 'gpt-5.4-mini',
            temperature: 0.3,
            llm_max_results: 3,
            max_output_tokens: 1000,
            vector_store_names: [source],
            instructions: DEFAULT_INSTRUCTIONS,
            reasoning_effort: 'none',
            verbosity: 'low',
            use_session: true
          })
        });

        const data = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(data.error || `HTTP ${response.status}`);
        }

        setAnswer(data.text || 'Sem resposta retornada.', false);
        setStatus('Consulta concluída.');
      } catch (error) {
        setAnswer(`Erro na consulta: ${error.message || 'falha inesperada.'}`, true);
        setStatus('Falha ao consultar o ConsBOT.');
      } finally {
        askButtonEl.disabled = false;
        askButtonEl.classList.remove('ragbot-loading');
      }
    }

    askButtonEl.addEventListener('click', askConsbot);
    queryInputEl.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        askConsbot();
      }
    });

    setStatus('Pronto para consulta.');
  </script>
</body>
</html>
