<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Embed Bibliomancia</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <link rel="stylesheet" href="/styles/style.css">
  <link rel="icon" type="image/png" href="/icon.png">
  <style>
    body.theme-apps {
      min-height: auto;
      background: transparent;
    }

    .embed-shell {
      max-width: 920px;
      margin: 0 auto;
      padding: 10px 12px;
    }

    .embed-card {
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-2xl);
      box-shadow: var(--shadow-sm);
      padding: 12px 14px;
    }

    .embed-header {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 10px;
    }

    .embed-header-icon {
      width: 50px;
      height: 50px;
      border-radius: var(--radius-xl);
      background: transparent;
      color: var(--apps-primary);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
      text-decoration: none;
      transition: transform 160ms ease, opacity 160ms ease, filter 160ms ease;
    }

    .embed-header-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .embed-header-icon:hover {
      transform: translateY(-1px) scale(1.04);
      opacity: 0.94;
      filter: saturate(1.05);
    }

    .embed-title {
      margin: 0;
      color: var(--gray-900);
      font-size: 1.05rem;
      font-weight: 700;
      line-height: 1.2;
    }

    .embed-subtitle {
      margin: 2px 0 0;
      color: var(--gray-600);
      font-size: 0.88rem;
      line-height: 1.35;
      font-style: italic;
    }

    .action-container {
      max-width: none;
      padding: 4px 0 0;
    }

    .pensata-button {
      padding: 12px 18px;
      font-size: 0.96rem;
      border-radius: 18px;
      gap: 10px;
    }

    .action-hint {
      margin-top: 10px;
      font-size: 0.86rem;
      line-height: 1.4;
    }

    .results {
      margin-top: 10px;
      width: 100%;
      display: none;
    }

    .embed-result {
      width: 100%;
      background: var(--white);
      border: 2px solid var(--gray-200);
      border-radius: 18px;
      box-shadow: none;
      padding: 12px 14px;
      margin-bottom: 8px;
    }

    .embed-result--pensata {
      background: #fffdf4;
      border-color: #f4efd8;
    }

    .embed-result h3 {
      margin: 0 0 8px;
      color: var(--apps-primary);
      font-size: 0.95rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .embed-result p {
      margin: 0;
      color: var(--gray-800);
      font-size: 0.92rem;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .embed-result .markdown-content {
      color: var(--gray-800);
      font-size: 0.92rem;
      line-height: 1.5;
    }

    .embed-result .markdown-content p:first-child {
      margin-top: 0;
    }

    .embed-result .markdown-content p:last-child {
      margin-bottom: 0;
    }

    .simple-ref {
      margin-top: 8px;
      font-size: 0.78rem;
    }

    .embed-footnote {
      margin-top: 8px;
      color: var(--gray-500);
      font-size: 0.76rem;
      line-height: 1.35;
    }

    .is-hidden {
      display: none !important;
    }

    .response-loading {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 44px;
      color: var(--gray-500);
    }

    .response-loading-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--apps-primary);
      opacity: 0.28;
      animation: embedPulse 1.2s ease-in-out infinite;
    }

    .response-loading-dot:nth-child(2) {
      animation-delay: 0.18s;
    }

    .response-loading-dot:nth-child(3) {
      animation-delay: 0.36s;
    }

    @keyframes embedPulse {
      0%, 100% {
        transform: translateY(0);
        opacity: 0.25;
      }
      50% {
        transform: translateY(-2px);
        opacity: 0.72;
      }
    }

    @media (max-width: 720px) {
      .embed-shell {
        padding: 8px;
      }

      .embed-card {
        padding: 10px 12px;
      }
    }
  </style>
</head>
<body class="theme-apps">
  <div class="embed-shell">
    <div class="embed-card">
      <div class="embed-header">
        <a class="embed-header-icon" href="https://cons-ia.org" target="_blank" rel="noopener noreferrer" aria-label="Abrir cons-ia.org">
          <img src="/icon.png" alt="Cons-IA">
        </a>
        <div>
          <h1 class="embed-title" id="title">Bibliomancia</h1>
          <p class="embed-subtitle" id="subtitle">Sorteio e análise de ortopensata com auxílio da IA.</p>
        </div>
      </div>

      <div class="action-container">
        <button id="drawButton" class="pensata-button" type="button">
          <i class="fas fa-book-open"></i>
          <span>Ortopensata</span>
        </button>
        <!-- <p class="action-hint" id="actionHint">
          Sorteia pensata do Léxico de Ortopensatas.<br>
          Comenta com auxílio da IA.
        </p> -->
      </div>

      <div class="results" id="results">
        <div class="embed-result" id="emptyState">
          <h3><i class="fas fa-sparkles"></i> Resultado</h3>
          <p>A pensata sorteada e o comentário aparecerão aqui.</p>
        </div>
      </div>

      <!--<div class="embed-footnote" id="footnote">Parâmetros opcionais: <code>?api=https://seu-backend</code>, <code>&title=Seu%20Título</code>, <code>&subtitle=Seu%20Subtítulo</code>.</div>-->
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script>
    const COMMENTARY_INSTRUCTIONS = [
      'Você é um assistente especialista em Conscienciologia, focado em responder perguntas sobre o livro Léxico de Ortopensatas, de autoria de Waldo Vieira, utilizando documentos de referência quando necessário.',
      'Analise o significado do parágrafo ("Pensata") sob o paradigma conscienciológico.',
      'Comente de maneira objetiva, utilizando neologismos e a abordagem específica da Conscienciologia.',
      'Limite a resposta a apenas 1 parágrafo breve e objetivo.',
      'Não repita nem transcreva a Pensata; inicie diretamente com a explicação seca.',
      'Não cite nem referencie fontes.',
      'Use Markdown limpo.',
      '',
      '**Autoquestionamento:**',
      'Breve pergunta para promover reflexão sobre a aplicação pessoal da Pensata visando à evolução consciencial.'
    ].join('\n');

    const params = new URLSearchParams(window.location.search);
    const apiBase = (params.get('api') || 'https://cons-ai-server.onrender.com').replace(/\/+$/, '');
    const title = params.get('title') || 'Bibliomancia';
    const subtitle = params.get('subtitle') || 'Sorteio e análise de ortopensata com auxílio da IA.';

    const titleEl = document.getElementById('title');
    const subtitleEl = document.getElementById('subtitle');
    const drawButtonEl = document.getElementById('drawButton');
    const actionHintEl = document.getElementById('actionHint');
    const resultsEl = document.getElementById('results');
    const emptyStateEl = document.getElementById('emptyState');
    const footnoteEl = document.getElementById('footnote');

    let currentController = null;

    titleEl.textContent = title;
    subtitleEl.textContent = subtitle;

    function renderMarkdown(text) {
      const rawHtml = marked.parse(text || '', { breaks: true });
      return DOMPurify.sanitize(rawHtml);
    }

    function setCompactMode(enabled) {
      if (actionHintEl) {
        actionHintEl.classList.toggle('is-hidden', enabled);
      }
      if (footnoteEl) {
        footnoteEl.classList.toggle('is-hidden', enabled);
      }
    }

    function renderResults(pensataText, reference, commentaryText) {
      resultsEl.innerHTML = `
        <div class="embed-result embed-result--pensata">
          <h3><i class="fas fa-book-open"></i> Pensata sorteada</h3>
          <div class="markdown-content">${renderMarkdown(pensataText)}</div>
          <div class="simple-ref">${reference}</div>
        </div>
        <div class="embed-result">
          <h3><i class="fas fa-comment-dots"></i> Comentário</h3>
          <div class="markdown-content">${renderMarkdown(commentaryText)}</div>
        </div>
      `;
    }

    function renderError(message) {
      resultsEl.innerHTML = `
        <div class="error">
          <p>Erro na bibliomancia: ${message}</p>
        </div>
      `;
    }

    async function postJson(path, payload, signal) {
      const response = await fetch(`${apiBase}${path}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
        signal
      });

      const data = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(data.error || `HTTP ${response.status}`);
      }
      return data;
    }

    async function drawPensata() {
      if (drawButtonEl.disabled) {
        return;
      }

      if (currentController) {
        currentController.abort();
      }

      currentController = new AbortController();
      const timeoutId = setTimeout(() => currentController.abort(), 45000);

      drawButtonEl.disabled = true;
      resultsEl.style.display = 'block';
      emptyStateEl?.classList.add('is-hidden');
      setCompactMode(false);
      resultsEl.innerHTML = `
        <div class="embed-result">
          <div class="response-loading" aria-label="Processando">
            <span class="response-loading-dot"></span>
            <span class="response-loading-dot"></span>
            <span class="response-loading-dot"></span>
          </div>
        </div>
      `;

      try {
        const pensataData = await postJson('/random_pensata', {
          term: 'none',
          book: 'LO'
        }, currentController.signal);

        const pensataText = (pensataData?.text || 'Pensata não retornada.').trim();
        const page = String(pensataData?.pagina || '').trim();
        const reference = page ? `Léxico de Ortopensatas, 2019, pág. ${page}` : 'Léxico de Ortopensatas, 2019';

        const commentaryData = await postJson('/llm_query', {
          query: `Comente a seguinte Pensata: ${pensataText}`,
          model: 'gpt-5.4-mini',
          temperature: 0.3,
          llm_max_results: 3,
          max_output_tokens: 1000,
          vector_store_names: ['ALLWV'],
          instructions: COMMENTARY_INSTRUCTIONS,
          reasoning_effort: 'none',
          verbosity: 'low',
          use_session: false
        }, currentController.signal);

        setCompactMode(true);
        renderResults(pensataText, reference, commentaryData?.text || 'Sem comentário retornado.');
      } catch (error) {
        const message = error?.name === 'AbortError'
          ? 'tempo limite excedido.'
          : (error.message || 'falha inesperada.');
        setCompactMode(true);
        renderError(message);
      } finally {
        clearTimeout(timeoutId);
        drawButtonEl.disabled = false;
        currentController = null;
      }
    }

    drawButtonEl.addEventListener('click', drawPensata);
  </script>
</body>
</html>
